name: Docs Pages

on:
  push:
    branches:
      - main
      - docs-staging
    paths:
      - ".github/workflows/docs-pages.yml"
      - "docs/product-docs/**"
      - "scripts/check-doc-links.py"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ghast-docs
      BUILD_DIR: docs/product-docs/.vitepress/dist
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify docs build and links
        run: pnpm docs:verify

      - name: Resolve deployment target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGET="$INPUT_TARGET"
          elif [ "$REF_NAME" = "main" ]; then
            TARGET="production"
          else
            TARGET="staging"
          fi

          if [ "$TARGET" = "production" ]; then
            PAGES_BRANCH="main"
          else
            PAGES_BRANCH="staging"
          fi

          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "pages_branch=$PAGES_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy ${{ env.BUILD_DIR }}
            --project-name=${{ env.PROJECT_NAME }}
            --branch=${{ steps.target.outputs.pages_branch }}
