name: Docs Pages

on:
  push:
    branches:
      - main
      - docs-staging
    paths:
      - ".github/workflows/docs-pages.yml"
      - "docs/product-docs/**"
      - "scripts/check-doc-links.py"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: ghast-docs
      BUILD_DIR: docs/product-docs/.vitepress/dist
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack and activate pnpm
        run: |
          corepack enable
          PNPM_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).packageManager.match(/^pnpm@(.*?)(\\+|$)/)[1]")"
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify docs build and links
        run: pnpm docs:verify

      - name: Resolve deployment target
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGET="$INPUT_TARGET"
          elif [ "$REF_NAME" = "main" ]; then
            TARGET="production"
          else
            TARGET="staging"
          fi

          if [ "$TARGET" = "production" ]; then
            PAGES_BRANCH="main"
          else
            PAGES_BRANCH="staging"
          fi

          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "pages_branch=$PAGES_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_VERSION: 4.72.0
        run: |
          pnpm dlx "wrangler@${WRANGLER_VERSION}" pages deploy "${BUILD_DIR}" \
            --project-name="${PROJECT_NAME}" \
            --branch="${{ steps.target.outputs.pages_branch }}"
